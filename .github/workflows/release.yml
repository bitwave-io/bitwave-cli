name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # npm trusted publishing: the job exchanges a GitHub OIDC token for npm
  # publish rights — no NPM_TOKEN secret. Each published package must list
  # this repo + workflow as a trusted publisher on npmjs.com.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing needs npm >= 11.5.1 for OIDC support.
      - run: npm install -g npm@latest && npm --version
      - name: Run tests
        run: go test ./...
      # Builds all platforms, signs + notarizes darwin binaries when the
      # MACOS_* secrets are present (skips cleanly when absent), creates the
      # GitHub Release with archives + checksums, and pushes the Homebrew cask
      # to bitwave-io/homebrew-tap. See docs/RELEASING.md for secret setup.
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
      - name: Publish to npm (OIDC trusted publishing)
        run: node scripts/publish-npm.mjs
