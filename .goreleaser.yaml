version: 2

project_name: bitwave

builds:
  - id: bitwave
    main: ./cmd/bitwave
    binary: bitwave
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/bitwave-io/bitwave-cli/internal/bitwave/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

# Sign + notarize the darwin binaries when Apple credentials are present in the
# environment; a release without them just skips this block. See
# docs/RELEASING.md for how to produce the cert (base64 p12) and the App Store
# Connect API key.
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - bitwave
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

archives:
  - id: default
    name_template: "bitwave_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: bitwave-io
    name: bitwave-cli
  draft: false
  prerelease: auto

homebrew_casks:
  - name: bitwave
    ids: [default]
    repository:
      owner: bitwave-io
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/bitwave-io/bitwave-cli
    description: Agent-first accounting platform — run locally, share in the cloud
